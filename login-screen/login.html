<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Saturn Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mq-telas-pequenas.css">
    <link rel="shortcut icon" href="../imagens/saturn-favicon.ico" type="image/x-icon">
</head>

<body>
    <!--header-->
    <header>
        <h2 class="logo">Saturn Online</h2>
        <nav class="navigation">
            <a href="../pag-inicial.html">Início</a>
            <button class="btnlogin-popup">Login</button>
        </nav>
    </header>

    <!-- Card Front Login -->
    <div class="wrapper">
        <div class="form-box login">
            <h2>Login</h2>
            <form action="#" method="get" autocomplete="off">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>E-mail</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Senha</label>
                </div>
                <div class="lembrar">
                    <label><input type="checkbox">
                        Manter conectado</label>
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn">Entrar</button>
                <div class="login-register">
                    <p>Não tem uma conta?<a href="#" class="register-link"> Registre-se aqui</a></p>
                </div>
            </form>
        </div>

        <!-- Card Back Registro -->
        <div class="form-box register">
            <h2>Cadastro</h2>
            <form action="#" method="get" autocomplete="off">
                <div class="input-box">
                    <span class="icon"><ion-icon name="person"></ion-icon></span>
                    <input type="text" required>
                    <label>Nome Completo</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>E-mail</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Senha</label>
                </div>
                
                <button type="submit" class="btn">Criar Conta</button>
                <div class="login-register">
                    <p>Já tem uma conta? <a href="#" class="login-link"> Entrar </a></p>
                </div>
            </form>
        </div>
    </div>


    <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>

</html>

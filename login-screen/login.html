<!doctype html>
<html lang="pt-br">
<head>
  <title>Login Saturn</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v2.1.9/css/unicons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="style-login.css">
</head>
<body>
	<div class="section">
		<div class="container">
			<div class="row full-height justify-content-center">
				<div class="col-12 text-center align-self-center py-5">
					<div class="section pb-5 pt-5 pt-sm-2 text-center">
              <h6 class="mb-0 pb-3"><span>Fazer Login</span><span>Cadastrar-se</span></h6>
				<!--CheckBox-->
					<input class="checkbox" type="checkbox" id="reg-log" name="reg-log"/>
					<label for="reg-log"></label>
				<!--CheckBox-->
				<!--Card-Front-->
	<div class="card-3d-wrap mx-auto">
		<div class="card-3d-wrapper">
			<div class="card-front">
				<div class="center-wrap">
					<div class="section text-center">

					<h4 class="mb-4 pb-3">Login</h4>
					<div class="form-group">
						<input type="email" class="form-style" placeholder="Email" required>
						<i class="input-icon uil uil-at"></i>
					</div>
					<div class="form-group mt-2">
						<input type="password" class="form-style" placeholder="Senha" required minlength="6" maxlength="10">
						<i class="input-icon uil uil-lock-alt"></i>
					</div>
						<a href="#" class="btn mt-4">Entrar</a>
						<p class="mb-0 mt-4 text-center"><a href="#" class="link">Esqueceu a senha?</a></p>
					</div>
				</div>
			</div>
				<!--Card-Front-->
				<!--Card-Back-->
	<div class="card-back">
		<div class="center-wrap">
			<div class="section text-center">

				<h4 class="mb-3 pb-3">Criar Conta</h4>
				<div class="form-group">
					<input type="text" class="form-style" placeholder="Nome completo" required>
					<i class="input-icon uil uil-user"></i>
				</div>	
				<div class="form-group mt-2">
					<input type="tel" class="form-style" placeholder="Celular" required>
					<i class="input-icon uil uil-phone"></i>
				</div>	
				<div class="form-group mt-2">
					<input type="email" class="form-style" placeholder="Email" required>
					<i class="input-icon uil uil-at"></i>
				</div>
				<div class="form-group mt-2">
					<input type="password" class="form-style" placeholder="Senha" required minlength="6" maxlength="10">
					<i class="input-icon uil uil-lock-alt"></i>
				</div>
				<a href="#" class="btn mt-4">Registrar</a>
				</div>
			</div>
		</div>
	</div>
</div>
				<!--Card-Back-->

<footer><a href="https://www.instagram.com/th_ntc/" target="_blank">By<br> Thgx$</a></footer>
</body>
</html>

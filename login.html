<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Saturn</title>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v2.1.9/css/unicons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="style-login.css">
</head>
<body>
    <h6><span>Login</span> <span>Cadastro</span></h6>

    <section>
        <form action="cadastro.php" method="post" autocomplete="on">
            <!--CheckBox-->
            <div>
                <input class="checkbox" type="checkbox" id="reg-log">
                <label for="reg-log"></label>
            </div>
            <!--CheckBox-->
            <!--Login-Front-->
            <div class="card-3d-wrap mx-auto">
                <div class="card-3d-wrapper">
                    <div class="card-front">
                        <div class="center-wrap">
                            <fieldset>
                                <legend>Login</legend>
                                    <div class="form-email">
                                        <input type="email" class="form-style" placeholder="Email" required>
                                        <label for="email"></label>
                                        <i class="input-icon uil uil-at"></i>
                                    </div>
                                    <div class="form-senha">
                                        <input type="password" class="form-style" placeholder="Senha" required min="6" max="10">
                                        <label for="senha"></label>
                                        <i class="input-icon uil uil-lock-alt"></i>
                                    </div>
                                    <a href="#" class="btn">Entrar</a>
                            </fieldset>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn Store</title>
    <link rel="shortcut icon" href="imagens/saturn-favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="estilos/style.css">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header><p>Todas as peças de frio da loja com desconto!</p>

        <div class="gif-container">
            <img src="imagens/gif-saturn.gif" alt="gif saturn">
        </div>
    </header>

    <main>
        <div class="quadrado1">
            Roupa 1
        </div>
        <div class="quadrado2">
            Roupa 2
        </div>
    </main>

    <div class="icons">
        <a href="https://www.instagram.com/saturnsonline/" target="_blank"><i class="fa-brands fa-instagram fa-bounce" id="insta"></i></a>
        <i class="fa-solid fa-cart-shopping" id="carrinho"></i>
    </div>

    <div class="sidebar">
        <div class="logo_content">
            <div class="logo">
                <div class="logo_name">Saturn</div>
            </div>
            <i class='bx bx-menu' id="btn"></i>
        </div>

        <div class="src">
            <i class='bx bx-search' ></i>
            <input type="text" placeholder="Pesquise...">
        </div>

        <ul class="nav">
            <li>
                <a href="#">
                    <i class='bx bxs-home' ></i>
                    <span class="link_name">Ínicio</span>
                </a>
                <span class="tooltip">Ínicio</span> 
            </li>
            <li>
                <a href="#">
                    <i class='bx bx-plus-medical' ></i>
                    <span class="link_name">Sobre Nós</span>
                </a>
                <span class="tooltip">Sobre Nós</span> 
            </li>
            <li>
                <a href="#">
                    <i class='bx bxs-t-shirt' ></i>
                    <span class="link_name">Coleção</span>
                </a>
                <span class="tooltip">Coleção</span> 
            </li>
            <li>
                <a href="#">
                    <i class='bx bxs-phone' ></i>
                    <span class="link_name">Contato</span>
                </a>
                <span class="tooltip">Contato</span> 
            </li>
        </ul>
    </div>

    <footer>&copy 2023,<a href="https://www.instagram.com/saturnsonline/" target="_blank"> Saturn</a><br>By <a href="https://www.instagram.com/th_ntc" target="_blank">Thgx$</a></footer>

    <script>
        let btn = document.querySelector('#btn');
        let sidebar = document.querySelector('.sidebar');
        let srcBtn = document.querySelector('.bx-search');

        btn.onclick = function(){
            sidebar.classList.toggle('active');
        }
        srcBtn.onclick = function(){
            sidebar.classList.toggle('active');
        }
    </script>
</body>
</html>
